<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 强制禁止手机端缩放和默认行为 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拖拽轮盘视频播放器</title>
    <style>
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; /* 禁用浏览器默认手势 */
            -webkit-tap-highlight-color: transparent; /* 去除手机点击的高亮背景 */
        }
        
        body {
            width: 100vw; height: 100vh;
            background-color: #1a1a1a; 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        img {
            -webkit-user-drag: none;
            pointer-events: none; 
        }

        #app-container {
            position: relative;
            width: 100%;
            max-width: calc(100vh * 1560 / 720);
            aspect-ratio: 1560 / 720;
            background: url('bg.jpg') center/cover no-repeat;
            background-color: #555; 
            overflow: hidden;
        }

        #video-player {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: none; 
            object-fit: cover; 
            z-index: 1; 
            pointer-events: none; 
        }

        /* ================= 关键修改：0号按钮区域 ================= */
        #btn-0-wrapper {
            position: absolute;
            top: 50%; left: 15%;
            transform: translate(-50%, -50%);
            /* 物理外框放大到 12%，提供巨大的触摸面积 */
            width: 12%; 
            aspect-ratio: 1 / 1; 
            z-index: 30;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .diamond-shape {
            position: relative;
            /* 视觉大小缩小到外框的 30%，保持小巧精致 */
            width: 30%; height: 30%;
            background-color: #fff;
            transform: rotate(45deg);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            overflow: hidden; 
        }

        .diamond-shape::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6); 
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #btn-0-wrapper.disabled .diamond-shape::after {
            opacity: 1; 
        }

        #btn-0-icon {
            transform: rotate(-45deg) scale(1.42); 
            width: 100%; height: 100%;
            object-fit: cover;
        }

        #progress-svg {
            position: absolute;
            /* 进度条大小匹配视觉图标 */
            width: 34%; height: 34%;
            pointer-events: none;
            transform: rotate(45deg);
            z-index: 31;
            display: none; 
        }
        #progress-path {
            fill: none;
            stroke: #ffcc00; 
            stroke-width: 4;
            stroke-dasharray: 320;
            stroke-dashoffset: 0; 
            transition: stroke-dashoffset 0.1s linear;
        }

        /* ================= 轮盘菜单 ================= */
        #radial-menu {
            position: absolute;
            top: 50%; left: 15%;
            width: 18.5%; /* 保持缩小 50% 的状态 */
            aspect-ratio: 1 / 1;
            transform: translate(-50%, -50%); 
            z-index: 20;
            display: none; 
            pointer-events: none; 
        }

        .menu-bg-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
        }

        .menu-item {
            position: absolute;
            width: 22%; 
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background-color: #d0d8e8;
            display: flex; justify-content: center; align-items: center;
            transform: translate(-50%, -50%);
            transition: all 0.2s;
            pointer-events: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            overflow: hidden; 
        }
        
        .menu-item img {
            width: 100%; height: 100%;
            border-radius: 50%; 
            object-fit: cover;
        }

        .menu-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6); 
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border-radius: 50%;
        }
        .menu-item.disabled::after {
            opacity: 1; 
        }

        .menu-item.highlight {
            transform: translate(-50%, -50%) scale(1.2);
            border: 4px solid #3b82f6; 
            background-color: #fff;
            z-index: 25;
        }

        #drag-line-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 25;
            display: none;
        }
    </style>
</head>
<body>

<div id="app-container">
    <video id="video-player" playsinline webkit-playsinline x5-video-player-type="h5"></video>

    <svg id="drag-line-layer">
        <line id="drag-line" x1="0" y1="0" x2="0" y2="0" stroke="#3b82f6" stroke-width="3" />
    </svg>

    <div id="radial-menu">
        <img class="menu-bg-img" src="lunpan.png" alt="menu background">
        
        <div class="menu-item" data-index="1"><img src="icon-1.png" alt="1"></div>
        <div class="menu-item" data-index="2"><img src="icon-2.png" alt="2"></div>
        <div class="menu-item" data-index="3"><img src="icon-3.png" alt="3"></div>
        <div class="menu-item" data-index="4"><img src="icon-4.png" alt="4"></div>
        <div class="menu-item" data-index="5"><img src="icon-5.png" alt="5"></div>
    </div>

    <div id="btn-0-wrapper">
        <div class="diamond-shape">
            <img id="btn-0-icon" src="icon-0-1.png" alt="Next Video">
        </div>
        <svg id="progress-svg" viewBox="0 0 90 90">
            <path id="progress-path" d="M 85 5 L 85 85 L 5 85 L 5 5 Z" />
        </svg>
    </div>
</div>

<script>
    document.addEventListener('dragstart', (e) => e.preventDefault());

    let isPlaying = false;
    let nextPlayIndex = 1; 
    let isDragging = false;
    let hoveredItemIndex = null;
    let startX = 0, startY = 0;

    const btn0 = document.getElementById('btn-0-wrapper');
    const btn0Icon = document.getElementById('btn-0-icon');
    const videoPlayer = document.getElementById('video-player');
    const radialMenu = document.getElementById('radial-menu');
    const menuItems = document.querySelectorAll('.menu-item');
    const progressSvg = document.getElementById('progress-svg');
    const progressPath = document.getElementById('progress-path');
    const dragLineLayer = document.getElementById('drag-line-layer');
    const dragLine = document.getElementById('drag-line');
    const appContainer = document.getElementById('app-container');

    // 轮盘图标位置计算
    const radiusPercent = 38; 
    const centerPercent = 50; 
    menuItems.forEach((item, index) => {
        const angle = -70 + (index * (140 / 4)); 
        const rad = angle * (Math.PI / 180);
        const x = Math.cos(rad) * radiusPercent + centerPercent; 
        const y = Math.sin(rad) * radiusPercent + centerPercent; 
        item.style.left = `${x}%`;
        item.style.top = `${y}%`;
    });

    function updateBtn0Icon(index) {
        btn0Icon.src = `icon-0-${index}.png`;
    }

    function playVideo(index) {
        videoPlayer.src = `video-${index}.mp4`;
        videoPlayer.style.display = 'block';
        videoPlayer.play();
        isPlaying = true;
        
        btn0.classList.add('disabled');
        menuItems.forEach(item => item.classList.add('disabled'));
        progressSvg.style.display = 'block'; 
    }

    videoPlayer.addEventListener('timeupdate', () => {
        if (videoPlayer.duration) {
            const progress = videoPlayer.currentTime / videoPlayer.duration;
            const offset = progress * 320;
            progressPath.style.strokeDashoffset = offset;
        }
    });

    videoPlayer.addEventListener('ended', () => {
        isPlaying = false;
        btn0.classList.remove('disabled');
        menuItems.forEach(item => item.classList.remove('disabled'));
        videoPlayer.style.display = 'none';
        progressPath.style.strokeDashoffset = 0;
        progressSvg.style.display = 'none'; 
    });

    // ================= 核心修复：统一获取坐标 =================
    function getCoords(e) {
        if (e.touches && e.touches.length > 0) {
            return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.changedTouches && e.changedTouches.length > 0) {
            return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        }
        return { x: e.clientX, y: e.clientY };
    }

    // ================= 核心修复：事件处理逻辑 =================
    function handleStart(e) {
        const coords = getCoords(e);
        startX = coords.x;
        startY = coords.y;
        isDragging = true;
        
        radialMenu.style.display = 'block';
        dragLineLayer.style.display = 'block';

        const btnRect = btn0.getBoundingClientRect();
        const containerRect = appContainer.getBoundingClientRect();
        const originX = btnRect.left + btnRect.width / 2 - containerRect.left;
        const originY = btnRect.top + btnRect.height / 2 - containerRect.top;
        
        dragLine.setAttribute('x1', originX);
        dragLine.setAttribute('y1', originY);
        dragLine.setAttribute('x2', originX);
        dragLine.setAttribute('y2', originY);
    }

    function handleMove(e) {
        if (!isDragging) return;
        e.preventDefault(); // 强制阻止手机屏幕滑动

        const coords = getCoords(e);
        const containerRect = appContainer.getBoundingClientRect();
        const currentX = coords.x - containerRect.left;
        const currentY = coords.y - containerRect.top;
        
        dragLine.setAttribute('x2', currentX);
        dragLine.setAttribute('y2', currentY);

        hoveredItemIndex = null;
        menuItems.forEach(item => {
            const rect = item.getBoundingClientRect();
            const itemCenterX = rect.left + rect.width / 2;
            const itemCenterY = rect.top + rect.height / 2;
            
            const dist = Math.hypot(coords.x - itemCenterX, coords.y - itemCenterY);
            const dynamicThreshold = rect.width * 1.2; 
            
            if (dist < dynamicThreshold) {
                item.classList.add('highlight');
                hoveredItemIndex = parseInt(item.getAttribute('data-index'));
            } else {
                item.classList.remove('highlight');
            }
        });
    }

    function handleEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        
        radialMenu.style.display = 'none';
        dragLineLayer.style.display = 'none';
        menuItems.forEach(item => item.classList.remove('highlight'));

        const coords = getCoords(e);
        const moveDistance = Math.hypot(coords.x - startX, coords.y - startY);
        
        if (moveDistance < 10) {
            // 单击播放
            if (!isPlaying) {
                playVideo(nextPlayIndex);
                nextPlayIndex = nextPlayIndex === 5 ? 1 : nextPlayIndex + 1;
                updateBtn0Icon(nextPlayIndex);
            }
        } else {
            // 拖拽播放
            if (hoveredItemIndex !== null) {
                if (!isPlaying) {
                    playVideo(hoveredItemIndex);
                    nextPlayIndex = hoveredItemIndex === 5 ? 1 : hoveredItemIndex + 1;
                    updateBtn0Icon(nextPlayIndex);
                } else {
                    nextPlayIndex = hoveredItemIndex;
                    updateBtn0Icon(nextPlayIndex);
                }
            }
        }
        hoveredItemIndex = null;
    }

    // ================= 核心修复：双端事件绑定 =================
    // 电脑端鼠标事件
    btn0.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    // 手机端触摸事件 (passive: false 允许使用 preventDefault 阻止滑动)
    btn0.addEventListener('touchstart', handleStart, { passive: false });
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleEnd);

</script>
</body>
</html>
